{% extends "base.html" %}
{% block content %}
<div class="row mt-4">
    <div class="col-md-3">
        <div class="card text-white bg-primary">
            <div class="card-body">
                <h5>Total Scans</h5>
                <h2>24</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-danger">
            <div class="card-body">
                <h5>Critical</h5>
                <h2>3</h2>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5>Recent Scans</h5>
            </div>
            <div class="card-body">
                {% for scan in scans %}
                <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
                    <div>
                        <h6>{{ scan.target_url }}</h6>
                        <small class="text-muted">{{ scan.status }} - {{ scan.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
                    </div>
                    <span class="badge bg-{% if scan.risk_score > 80 %}danger{% elif scan.risk_score > 50 %}warning{% else %}success{% endif %}">
                        {{ "%.1f"|format(scan.risk_score) }}%
                    </span>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
